name: Release

on:
  push:
    # Canonical branch name mirrors infrastructure/repo-config.yaml defaultBranch
    # (GitHub workflows cannot derive on.push.branches from that file).
    branches:
      - main
  # No workflow_dispatch (ASW-326). A dispatched run can target any ref, and npm
  # Trusted Publishing binds its OIDC subject to repository + workflow filename
  # only — NOT the trigger/ref/actor — so a dispatch against an attacker branch
  # would satisfy the same OIDC subject as a legitimate post-merge push and could
  # publish a poisoned tarball with valid provenance to every downstream consumer.
  # Publishing is therefore push-to-main only; re-run a failed release via
  # "Re-run jobs" on the original push run.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # Queue releases instead of cancelling

jobs:
  # Build-time code (pnpm install + tsc + npm pack) runs ONLY here, in a job that
  # holds no publish credential (ASW-328). The single tarball this job packs is
  # the exact artifact both publish legs download and ship — so the npm tarball,
  # the GitHub Packages tarball, and the attested digest are byte-identical, and
  # a compromised build-time dependency can never reach a mintable OIDC token.
  build:
    name: 🏗️ Build & pack
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read # Checkout + build only — no publish identity here.
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false # Nothing git-pushes; avoid artipacked exposure.

      - name: ⚙️ Load repo config
        id: repo
        uses: ./.github/actions/load-repo-config

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4.4.0
        with:
          run_install: false

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ steps.repo.outputs.node_version_file }}
          cache: pnpm

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build
        run: pnpm run build

      # Pack once. The published tarball (both registries) and the attested digest
      # are all this exact file — consumers can `gh attestation verify <tarball>`.
      - name: 📦 Pack tarball
        id: pack
        run: |
          set -euo pipefail
          tarball="$(npm pack --silent)"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
          echo "Packed $tarball"

      - name: ⬆️ Upload tarball artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-tarball
          path: ${{ steps.pack.outputs.tarball }}
          if-no-files-found: error
          # Tight TTL keeps the credential-adjacent artifact around only as long
          # as a release needs it. Trade-off: re-running the release/publish jobs
          # in isolation >24h later finds the artifact gone — re-run the whole
          # workflow (or push again) to rebuild it.
          retention-days: 1

  release:
    name: 🚀 Release (npm)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Branch-restricted Environment (ASW-326): npm-release permits deployments
    # ONLY from refs/heads/main, so a non-main ref is rejected by GitHub before
    # the OIDC token is mintable. No required reviewers — the road-runner-bot
    # release flow (ASW-311/320) stays hands-off; this is a structural ref gate,
    # not a manual approval gate.
    environment: npm-release
    outputs:
      # Reused by publish-github-packages so it gates on the same condition
      # without re-detecting (true = version bumped, not yet tagged = publish;
      # false = tag already exists = clean no-op).
      should_publish: ${{ steps.gate.outputs.publish }}
    permissions:
      contents: write # Git tags + GitHub releases on publish
      id-token: write # OIDC for npm Trusted Publishing + provenance attestation
      issues: write # Open a tracking issue if the release fails (notify step)
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # Full history + tags so the version-vs-tag gate can resolve.
          # This workflow is publish-only. The release PR is created AND merged
          # by the road-runner-bot orchestrator (private release-orchestrator
          # repo, running release-please); its App-token merge re-fires this
          # workflow, which then sees a freshly bumped, untagged version and
          # publishes. The bot's private key never touches this public repo's CI
          # (ASW-311 / ASW-312 / ASW-320 / SK-371).
          token: ${{ secrets.GITHUB_TOKEN }}
          # Don't write GITHUB_TOKEN into .git/config — nothing here git-pushes
          # (tags/release go via the gh API, npm via OIDC). Avoids the artipacked
          # credential-persistence exposure.
          persist-credentials: false

      - name: ⚙️ Load repo config
        id: repo
        uses: ./.github/actions/load-repo-config

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4.4.0
        with:
          run_install: false

      - name: 🟢 Setup Node.js (npm registry)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ steps.repo.outputs.node_version_file }}
          # This job no longer runs `pnpm install` (build does), but cache: pnpm
          # still warms the pnpm store the next step's `pnpm add -g npm@…` pulls
          # from. Cheap and keeps the upgrade-npm step fast.
          cache: pnpm
          registry-url: ${{ steps.repo.outputs.npm_registry_url }}

      - name: ⬆️ Upgrade npm for Trusted Publishing
        # npm Trusted Publishing requires npm CLI v11.5.1+. Latest Node 22
        # (22.22.3 at time of writing) still ships npm 10.9.8 — well below the
        # threshold — so this step is still required. Pinned to a specific
        # version rather than `@latest` so CI is reproducible (re-verified
        # 2026-05-15 against `nodejs.org/dist/index.json`; ASW-165).
        #
        # The bundled npm 10.9.x in the ubuntu-latest runner image is broken
        # on self-upgrade (`Cannot find module 'promise-retry'`), so install
        # via pnpm. PNPM_HOME is exported but actions/setup-node prepends its
        # tool-cache bin AFTER pnpm/action-setup runs, so the bundled npm
        # wins on PATH unless we explicitly add PNPM_HOME to GITHUB_PATH for
        # subsequent steps. ASW-173 caught this silently: TP fell back to
        # setup-node's placeholder `_authToken` in `.npmrc` and the registry
        # returned E404. See ASW-174.
        run: |
          pnpm add -g npm@11.14.1
          echo "$PNPM_HOME" >> "$GITHUB_PATH"
          echo "Upgraded npm at $PNPM_HOME/npm: $("$PNPM_HOME/npm" --version)"

      # Publish-only: versioning (the release PR that bumps package.json +
      # .release-please-manifest.json, and the changelog finalise) is owned by
      # the private release-orchestrator running release-please (SK-371/SK-376).
      # This keyless gate replaces the old `.changeset/*.md` scan: we publish iff
      # package.json's version has no matching git tag yet. On a feature-merge the
      # version is unchanged → its tag exists → clean no-op (the orchestrator
      # opens/updates the release PR). On the release-PR merge the version is
      # freshly bumped → no tag yet → we publish. Tags are present because the
      # checkout above uses fetch-depth: 0.
      - name: 🔎 Detect release (version vs tag)
        id: gate
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            publish=false
          else
            publish=true
          fi
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "package.json version: $version; tag $tag exists: $([ "$publish" = false ] && echo yes || echo no); publish: $publish"

      # Download the exact tarball built in the unprivileged `build` job (ASW-328)
      # — this job never builds from source, so no build-time code runs alongside
      # the npm OIDC credential.
      - name: ⬇️ Download tarball artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-tarball
          path: ./.artifact

      - name: 🔎 Resolve tarball path
        id: tb
        run: |
          set -euo pipefail
          tarball="$(ls "$PWD"/.artifact/*.tgz)"
          echo "path=$tarball" >> "$GITHUB_OUTPUT"
          echo "Publishing tarball: $tarball"

      - name: 🚀 Publish (npm)
        # Two independent controls (ASW-326): the branch-restricted npm-release
        # environment AND this explicit ref guard. event_name/ref are constant
        # now that workflow_dispatch is gone, but the guard is kept as the
        # porting template's structural defence-in-depth.
        if: >-
          github.event_name == 'push'
          && github.ref == 'refs/heads/main'
          && steps.gate.outputs.publish == 'true'
        # Direct call to the raw-npm wrapper (no changesets/action shell now that
        # Changesets is gone — SK-371). The wrapper calls `npm publish` directly
        # via $PNPM_HOME/npm: pnpm's own publish path fails OIDC Trusted
        # Publishing even with the upgraded npm on PATH (ASW-174). It publishes
        # the prebuilt $TARBALL (ASW-328), not a re-pack of the working tree, and
        # is idempotent (skips if the version is already on npm).
        env:
          # No NPM_TOKEN — Trusted Publishing via OIDC.
          # Provenance is enabled in package.json's publishConfig.
          # No GITHUB_TOKEN — the wrapper only needs PNPM_HOME + TARBALL; the
          # tag + GitHub release below uses gh with its own GH_TOKEN.
          TARBALL: ${{ steps.tb.outputs.path }}
          HUSKY: 0
        run: bash infrastructure/scripts/publish-via-raw-npm.sh

      # npm publish creates no git tag or GitHub release on its own, so do it
      # explicitly. Idempotent: skips if the release already exists, so re-runs
      # are safe.
      - name: 🏷️ Tag + GitHub release
        if: >-
          github.event_name == 'push'
          && github.ref == 'refs/heads/main'
          && steps.gate.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — nothing to do."
            exit 0
          fi

          # There is no root CHANGELOG.md (release-please runs with
          # skip-changelog — SK-371). Source the notes from the dated changelog/
          # entry/entries this release stamped with `version: <version>` (the
          # orchestrator's finalise-changelog.ts sets it before the release PR
          # merges). One release PR can bundle several feature merges, so
          # concatenate every matching entry's body.
          notes=""
          for f in changelog/*.md; do
            [ "$(basename "$f")" = "README.md" ] && continue
            v="$(awk -F': *' '/^version:/{gsub(/["'\'' ]/,"",$2); print $2; exit}' "$f")"
            [ "$v" = "$version" ] || continue
            body="$(awk 'BEGIN{d=0} /^---[[:space:]]*$/{d++; next} d>=2{print}' "$f")"
            notes="${notes}${notes:+$'\n\n'}${body}"
          done
          [ -z "$(printf '%s' "$notes" | tr -d '[:space:]')" ] && notes="See the changelog/ entry for ${tag}."

          gh release create "$tag" \
            --title "$tag" \
            --target "$GITHUB_SHA" \
            --notes "$notes"
          echo "Created $tag at $GITHUB_SHA."

      # Fires only if a step above failed. A release runs post-merge on `main`
      # with nobody watching a PR, so a failed publish would otherwise be
      # silent — this opens (or comments on) a tracking issue with a runbook.
      # Note: this covers run FAILURES only. release.yml is push-triggered, so
      # unlike the scheduled orchestrator it is never silently disabled by
      # GitHub's 60-day inactivity rule.
      - name: 🚨 Notify on release failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          title="🚨 Release workflow failed"
          body=$(printf '%s\n' \
            "The Release workflow failed on \`main\`." \
            "" \
            "- Run: $RUN_URL" \
            "" \
            "## Likely cause & fix" \
            "- **Build step** — see the failing step in the run log." \
            "- **npm publish (OIDC)** — Trusted Publishing hiccup, or the version is already published. The publish wrapper is idempotent, so a re-run usually clears a transient failure." \
            "" \
            "Re-run from the Actions tab once resolved. This issue auto-comments on repeat failures instead of opening duplicates."
          )
          # Search on the text portion only — GitHub's full-text search
          # indexes emoji unreliably, so matching on the 🚨 risks missing the
          # existing issue and opening a duplicate on every failure. The emoji
          # still appears in the created title below.
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --search "Release workflow failed in:title" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "Appending to existing failure issue #$existing."
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" --body "$body"
          else
            echo "Opening a new failure issue."
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body "$body"
          fi

  # Secondary publish target (ASW-323). A SEPARATE job so packages: write is
  # scoped here and never granted to the main `release` job. Runs only after npm
  # publish succeeds (needs: release) and only on a release-PR merge — the same
  # version-vs-tag gate, reused via the release job's output, plus the same
  # main-only ref guard + npm-release environment (ASW-326). GitHub Packages
  # has no OIDC Trusted-Publisher flow, so this leg authenticates with the
  # ephemeral per-job GITHUB_TOKEN; provenance is supplied out-of-band by a
  # GitHub-native attestation over the exact tarball (npm --provenance is
  # npmjs.org-only). It downloads and publishes the SAME tarball the npm leg
  # shipped (ASW-328) — never re-built from source.
  publish-github-packages:
    name: 📦 Publish to GitHub Packages
    needs: release
    if: >-
      needs.release.outputs.should_publish == 'true'
      && github.event_name == 'push'
      && github.ref == 'refs/heads/main'
    environment: npm-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read # Checkout only
      packages: write # Publish to GitHub Packages
      id-token: write # Sigstore signing for the build-provenance attestation
      attestations: write # Upload the attestation to GitHub
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Publish/attest only — never git-pushes. Don't persist GITHUB_TOKEN in
          # .git/config (artipacked credential-persistence exposure).
          persist-credentials: false

      - name: ⚙️ Load repo config
        id: repo
        uses: ./.github/actions/load-repo-config

      # GitHub Packages variant: scoped .npmrc pointing at npm.pkg.github.com.
      # No pnpm/build step — this job publishes the prebuilt artifact (ASW-328),
      # and no npm-upgrade step (token auth has no npm-version floor; the 11.5.1
      # bump on the npm leg is a Trusted-Publishing requirement that doesn't
      # apply here).
      - name: 🟢 Setup Node.js (GitHub Packages)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ steps.repo.outputs.node_version_file }}
          registry-url: ${{ steps.repo.outputs.github_packages_registry_url }}
          scope: ${{ steps.repo.outputs.npm_scope }}

      - name: ⬇️ Download tarball artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-tarball
          path: ./.artifact

      - name: 🔎 Resolve tarball path
        id: tb
        run: |
          set -euo pipefail
          tarball="$(ls "$PWD"/.artifact/*.tgz)"
          echo "path=$tarball" >> "$GITHUB_OUTPUT"
          echo "Publishing tarball: $tarball"

      - name: 🔏 Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.tb.outputs.path }}

      - name: 📦 Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PACKAGES_REGISTRY_URL: ${{ steps.repo.outputs.github_packages_registry_url }}
          TARBALL: ${{ steps.tb.outputs.path }}
        run: bash infrastructure/scripts/publish-to-github-packages.sh
