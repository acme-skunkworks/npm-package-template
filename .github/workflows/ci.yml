name: CI

on:
  pull_request:
    # `edited` is included so the conventional-PR-title lint (pr-title job) and
    # the changelog-completeness gate re-run when a title is corrected — the PR
    # title is the release-please bump signal (SK-371), so a stale pass on an
    # old title would be unsafe. The default set is opened/synchronize/reopened.
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Defence-in-depth (ASW-313): the repo default is already read-only, but
# pin it here so a future org-policy change can't silently widen CI's token.
permissions:
  contents: read

# The lint + build-test work runs through the estate's shared reusable
# workflows (SK-447, completing SK-424's deferred caller half); the template is
# the reference consumer that proves the pattern before the fleet rollout
# (SK-420). Both callers are SHA-pinned to one commit so Dependabot bumps them
# together (SK-446). The two checks that have no reusable lane stay inline:
# `pr-title` (its own consumer-migration track, SK-428/SK-403) and the
# changelog-completeness gate (it reads the PR title, which a reusable workflow
# can't). The `go/no-go` aggregator (SK-412/SK-424) stays local and unchanged —
# it is the estate-canonical required check and lives per-repo by design.
jobs:
  # Loads infrastructure/repo-config.yaml once and exposes it to the reusable
  # callers, which — being `uses:` jobs — cannot run a step to read it inline
  # the way the old per-job `load-repo-config` steps did. This is the
  # caller-stub pattern (feed reusable-workflow inputs from repo-config): a
  # generated package that changes `nodeVersionFile` has it flow through here to
  # every downstream job without editing the workflow.
  config:
    name: ⚙️ Load repo config
    runs-on: ubuntu-latest
    outputs:
      node_version_file: ${{ steps.repo.outputs.node_version_file }}
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          # Read-only job; don't persist the token into .git/config (zizmor
          # artipacked). Matches the reusable callers' checkouts.
          persist-credentials: false

      - name: ⚙️ Load repo config
        id: repo
        uses: ./.github/actions/load-repo-config

  # ESLint + Markdown + YAML/actionlint + dated-changelog validation, via the
  # shared Layer-2 lint bundle. Renders the status context `lint / Lint`.
  # Deliberately NOT skipped on the release-please branch — the changelog lane
  # must validate the entries finalise-changelog.ts rewrites there before merge
  # (was the old build-and-lint's `validate:changelog` step, ASW-311).
  lint:
    needs: config
    uses: acme-skunkworks/shared-workflows/.github/workflows/reusable-lint.yml@9b7e7dca9c2c0ad3e1dd8a4ea4dcaa8442d4aee0 # 9b7e7dc
    with:
      node-version-file: ${{ needs.config.outputs.node_version_file }}
      # Directory args, NOT globs: the action runs `eslint $ESLINT_ARGS`
      # word-split with bash globstar OFF, so a `src/**/*.ts` glob would
      # mis-expand. Passing directories lets ESLint's flat config resolve the
      # file set recursively — reproducing the `lint` script's scope (src +
      # infra scripts; tsconfig.eslint.json also covers tests, which we
      # intentionally omit, matching today's behaviour).
      eslint-args: src infrastructure/scripts
      # Match the `lint:md` script: include .mdx and the dist/turbo/astro
      # excludes the estate default omits.
      markdown-globs: |
        **/*.{md,mdx}
        !**/node_modules/**
        !**/dist/**
        !**/.turbo/**
        !**/.astro/**
      # The template's validator script is `validate:changelog` (the reusable
      # default is `changelog:validate`).
      changelog-script: validate:changelog
      # yaml lane defaults are correct: yaml-paths `.`, yamllint 1.37.1
      # (matches), actionlint 1.7.12 (owned upstream in lockstep, SK-422 — do
      # not override per-consumer). yamllint uses shared-workflows' centralised
      # .yamllint.yml (SK-438), so the repo's local .yamllint.yml is now only
      # consumed by the pre-commit hook.

  # Build (verification) + Vitest + ShellCheck + bats, via the shared Layer-2
  # build/test bundle. Renders the status context `build-test / Build & Test`.
  # Absorbs the old build-and-lint `build` step plus the entire `infra` job.
  build-test:
    needs: config
    uses: acme-skunkworks/shared-workflows/.github/workflows/reusable-build-test.yml@9b7e7dca9c2c0ad3e1dd8a4ea4dcaa8442d4aee0 # 9b7e7dc
    with:
      node-version-file: ${{ needs.config.outputs.node_version_file }}
      # Off to preserve current behaviour: CI runs no standalone typecheck today
      # (the `build` lane = `tsc` type-checks src; the tools/infra pass via
      # `pnpm tsc`/tsconfig.tools.json is not a CI gate). The reusable lane only
      # type-checks one tsconfig, so it can't replicate `pnpm tsc`'s two passes.
      typecheck: false
      # Mirror the `lint:sh` script: the action `find`s *.sh/*.bash under a
      # directory but takes files literally, so pass the scripts dir plus the
      # three extensionless husky hooks explicitly (a `.husky` dir arg would
      # find none of them). Default severity `style` matches bare shellcheck.
      shellcheck-paths: "infrastructure/scripts .husky/pre-commit .husky/pre-push .husky/commit-msg"
      # Opt-in (off by default). bats runs via `pnpm exec bats`, so `bats` is a
      # devDependency (bats@1.13.0, matching ensure-bats.sh's pin). bats-paths
      # defaults to infrastructure/tests, recursive.
      bats: true

  # Conventional-PR-title lint (SK-371). The repo squash-merges, so the PR title
  # IS the squash subject release-please parses to decide the bump — a mistyped
  # prefix silently ships the wrong semver. This guards the format. Runs on every
  # PR including the release-please PR (whose `chore: release …` title is a valid
  # conventional subject, so it passes cleanly — no skip needed).
  #
  # The job `name` below IS the GitHub status-check context, and it is the
  # estate-canonical string shared verbatim with octavo and the other release
  # repos (SK-400) so SK-405 can pin ONE required-check context across the whole
  # estate. It intentionally breaks this repo's emoji-prefixed job-name
  # convention — do NOT "tidy" it back; the exact text must stay stable or the
  # estate-wide required-check pin breaks. Stays inline (its own caller-migration
  # track, SK-428/SK-403) until a shared pr-title reusable workflow exists.
  pr-title:
    name: Validate PR title is a Conventional Commit
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: 🔠 Lint PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Mirror the Conventional Commits types /send-it emits. Only feat / fix
          # / a `!` breaking marker are release-triggering (release-please default
          # node bump table); the rest are non-release types.
          types: |
            feat
            fix
            docs
            chore
            ci
            refactor
            perf
            test
            build
            style
            revert

  # Changelog-completeness gate (SK-371): a release-triggering PR title
  # (feat/fix/breaking) must carry a dated changelog/ entry. Restores the
  # no-changeset-no-release coupling now that the bump is inferred from the PR
  # title. Non-release titles (docs/chore/ci/…) — including the release-please
  # PR's own `chore: release …` — are a clean pass. Stays inline because it reads
  # the PR title (github.event.pull_request.title), which a reusable workflow
  # can't see; was a step inside the old build-and-lint job.
  changelog-completeness:
    name: 📓 Changelog completeness
    needs: config
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history: the gate diffs against origin/<base_ref>.
          fetch-depth: 0
          # Local diff only (no runtime fetch), so the token isn't needed after
          # checkout; don't persist it (zizmor artipacked).
          persist-credentials: false

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4.4.0
        with:
          run_install: false

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ needs.config.outputs.node_version_file }}
          cache: pnpm

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📓 Changelog completeness
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_REF: ${{ github.base_ref }}
        run: pnpm tsx infrastructure/scripts/check-changelog-completeness.ts

  # Single estate release gate (SK-412/SK-424). An always()-run aggregator whose
  # intrinsic check-run, named `go/no-go`, succeeds iff every required job above
  # passed or legitimately skipped. A check-run (not a commit status) is
  # App-only — minted solely by this repo's own Actions run — so a push-scoped
  # token or a fork contributor cannot forge it; require it on `main` via a
  # ruleset pinned to the GitHub Actions integration. The literal `/` in the job
  # name surfaces verbatim as `check_run.name == "go/no-go"` (emoji and spaces
  # already survive in `lint / Lint`); if it ever doesn't, fall back to
  # explicit-create (POST /check-runs, Option A). Transitional (SK-419): the
  # release-orchestrator still waits on `🔬 Build & Lint` until it is flipped to
  # `go/no-go` (dual-accept) — that context no longer exists here, so the fleet
  # rollout (SK-420) must land alongside SK-419. Safe on THIS repo: Release is
  # disabled, so nothing here waits on the orchestrator.
  #
  # The caller swap SK-411 foreshadowed has now landed (SK-447): the lint /
  # build-test work runs through acme-skunkworks/shared-workflows reusable
  # workflows; this aggregator stays put across that swap, which is exactly why
  # it lives here (custom per-repo) and not upstream.
  go-no-go:
    name: go/no-go
    needs: [config, lint, build-test, pr-title, changelog-completeness]
    if: ${{ always() }} # MANDATORY — else the aggregator skips and the gate never reports
    runs-on: ubuntu-latest
    steps:
      - name: ⚖️ Verdict
        # `skipped` is accepted to match the canonical reference impl (SK-418)
        # verbatim so the template stays the reference emitter. `config` is in
        # `needs` so a config failure (which would skip the callers, and skips
        # are accepted) still fails the gate directly; tightening the allowlist
        # is a documented follow-up, deferred to the shared-workflows reference.
        run: |
          echo '${{ toJSON(needs) }}' \
            | jq -e 'to_entries | all(.value.result == "success" or .value.result == "skipped")' >/dev/null \
            || { echo "::error::a required check failed"; exit 1; }
