name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Skip the review when a PR changes ONLY the Claude workflow files.
    # claude-code-action's app-token exchange requires the invoking workflow to
    # match the version on the default branch, so a PR that edits these files
    # 401s on workflow validation and can't be reviewed by the bot anyway —
    # this avoids a spurious failing check. paths-ignore skips only when EVERY
    # changed file matches; a PR touching these plus anything else still runs.
    # (claude-review is not a required status check, so a path-skip won't block
    # merges — verified against the repo rulesets.) The trigger + paths-ignore
    # stay in the caller (SK-432); the reusable workflow can't see them.
    paths-ignore:
      - ".github/workflows/claude.yml"
      - ".github/workflows/claude-code-review.yml"

# Thin caller of the estate's shared reusable Claude code-review workflow
# (SK-426/SK-432). The draft / release-please skip `if:`, concurrency, the
# `id-token: write` OIDC permission, and the hardened review config (origin/main
# config restore, tight --allowedTools, no publish identity) all live in the
# reusable workflow — one source of truth inherited by every generated repo
# instead of a drifting inline copy. `secrets: inherit` passes
# CLAUDE_CODE_OAUTH_TOKEN through. SHA-pinned to the same shared-workflows commit
# as the other callers so Dependabot's grouped `github-actions` bump stays atomic.
jobs:
  claude-review:
    uses: acme-skunkworks/shared-workflows/.github/workflows/reusable-claude-code-review.yml@9b7e7dca9c2c0ad3e1dd8a4ea4dcaa8442d4aee0 # 9b7e7dc
    secrets: inherit
