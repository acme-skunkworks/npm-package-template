name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Skip the review when a PR changes ONLY the Claude workflow files.
    # claude-code-action's app-token exchange requires the invoking workflow to
    # match the version on the default branch, so a PR that edits these files
    # 401s on workflow validation and can't be reviewed by the bot anyway —
    # this avoids a spurious failing check. paths-ignore skips only when EVERY
    # changed file matches; a PR touching these plus anything else still runs.
    # (claude-review is not a required status check, so a path-skip won't block
    # merges — verified against the repo rulesets.)
    paths-ignore:
      - ".github/workflows/claude.yml"
      - ".github/workflows/claude-code-review.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: github.event.pull_request.draft == false && !startsWith(github.head_ref, 'changeset-release/')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      issues: read
      # Required: claude-code-action exchanges an OIDC token for its short-lived
      # GitHub token (getOidcToken → setupGitHubToken). Removing it fails the run
      # with "Could not fetch an OIDC token" — it is NOT just for publishing, so
      # the ASW-329 least-privilege drop was reverted.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        # If startup crashes with an AJV schema error, see anthropics/claude-code-action#947
        # and pin to a known-good version (e.g. v1.0.51).
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1.0.133
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # NB: this action version (v1.0.133) has NO marketplace ref-pin
          # mechanism. base-action/src/install-plugins.ts validates the input
          # against /^https:\/\/…\.git$/ — it MUST end in `.git` — then passes
          # it verbatim to `claude plugin marketplace add`. A `#tag`/`@ref`
          # suffix fails the regex ("Invalid marketplace URL format") and a
          # bare URL always clones the marketplace at default-branch HEAD.
          # So the ASW-329 immutable-tag pin is impossible here and the
          # marketplace necessarily floats (ASW-343). Accepted risk: the
          # marketplace repo is the same first-party org (anthropics) as the
          # SHA-pinned action above, and the review is already hardened —
          # config restored from origin/main (untrusted PR head), WebSearch/
          # WebFetch disallowed, tight --allowedTools, no publish identity.
          # Do NOT re-add a `#tag` suffix: it re-breaks the job.
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          allowed_bots: "road-runner-bot[bot]"
          track_progress: true
          use_sticky_comment: true
          claude_args: '--allowedTools "mcp__github_inline_comment__create_inline_comment,mcp__github_comment__update_claude_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'
