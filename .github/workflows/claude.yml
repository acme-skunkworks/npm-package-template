name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

# Thin caller of the estate's shared reusable Claude workflow (SK-426/SK-432).
# The maintainer-only author-association gate (ASW-313 — OWNER/MEMBER/COLLABORATOR
# can fire a privileged `@claude` run), the `id-token: write` OIDC permission, and
# the claude-code-action step all live in the reusable workflow, so this repo —
# and every repo generated from this template — inherits one source of truth
# instead of a drifting inline copy. `secrets: inherit` passes
# CLAUDE_CODE_OAUTH_TOKEN through. SHA-pinned to the same shared-workflows commit
# as the other callers so Dependabot's grouped `github-actions` bump stays atomic.
jobs:
  claude:
    uses: acme-skunkworks/shared-workflows/.github/workflows/reusable-claude.yml@9b7e7dca9c2c0ad3e1dd8a4ea4dcaa8442d4aee0 # 9b7e7dc
    secrets: inherit
